server:
  port: 8080

spring:
  application:
    name: travel-planner-api

  datasource:
    url: jdbc:h2:mem:travel_planner;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT Configuration
app:
  jwt:
    secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970337336763979244226452948404D6351655468576D5A7134743777217A25432A46
    access-token-expiration: 900000      # 15 minutes
    refresh-token-expiration: 2592000000 # 30 days

# File Upload
  file:
    upload-dir: ./uploads
    max-size: 10485760  # 10MB
    allowed-types: image/jpeg,image/png,image/gif,application/pdf,text/plain

logging:
  level:
    com.travelplanner: DEBUG
    org.springframework.security: INFO
